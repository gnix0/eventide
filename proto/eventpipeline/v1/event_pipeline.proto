syntax = "proto3";

package eventpipeline.v1;

service PipelineService {
  rpc CreatePipeline(CreatePipelineRequest) returns (CreatePipelineResponse);
  rpc UpdatePipelineVersion(UpdatePipelineVersionRequest) returns (UpdatePipelineVersionResponse);
  rpc GetPipeline(GetPipelineRequest) returns (GetPipelineResponse);
  rpc ListPipelines(ListPipelinesRequest) returns (ListPipelinesResponse);
  rpc DeployPipeline(DeployPipelineRequest) returns (DeployPipelineResponse);
  rpc PausePipeline(PausePipelineRequest) returns (PausePipelineResponse);
  rpc ResumePipeline(ResumePipelineRequest) returns (ResumePipelineResponse);
  rpc RequestReplay(RequestReplayRequest) returns (RequestReplayResponse);
  rpc GetReplayJob(GetReplayJobRequest) returns (GetReplayJobResponse);
}

service TopicService {
  rpc RegisterTopic(RegisterTopicRequest) returns (RegisterTopicResponse);
  rpc GetTopic(GetTopicRequest) returns (GetTopicResponse);
  rpc ListTopics(ListTopicsRequest) returns (ListTopicsResponse);
}

service AdminService {
  rpc CreateTenant(CreateTenantRequest) returns (CreateTenantResponse);
  rpc GetTenant(GetTenantRequest) returns (GetTenantResponse);
  rpc ListTenants(ListTenantsRequest) returns (ListTenantsResponse);
  rpc AssignRoleBinding(AssignRoleBindingRequest) returns (AssignRoleBindingResponse);
  rpc ListRoleBindings(ListRoleBindingsRequest) returns (ListRoleBindingsResponse);
  rpc CreateServiceAccount(CreateServiceAccountRequest) returns (CreateServiceAccountResponse);
  rpc ListServiceAccounts(ListServiceAccountsRequest) returns (ListServiceAccountsResponse);
}

service RunService {
  rpc GetRunStatus(GetRunStatusRequest) returns (GetRunStatusResponse);
  rpc ListAssignments(ListAssignmentsRequest) returns (ListAssignmentsResponse);
  rpc GetCheckpointHistory(GetCheckpointHistoryRequest) returns (GetCheckpointHistoryResponse);
  rpc ListDeadLetters(ListDeadLettersRequest) returns (ListDeadLettersResponse);
}

service CoordinatorService {
  rpc RegisterWorker(RegisterWorkerRequest) returns (RegisterWorkerResponse);
  rpc HeartbeatWorker(HeartbeatWorkerRequest) returns (HeartbeatWorkerResponse);
  rpc ListWorkers(ListWorkersRequest) returns (ListWorkersResponse);
  rpc RebalancePipeline(RebalancePipelineRequest) returns (RebalancePipelineResponse);
  rpc ExpireWorkerLeases(ExpireWorkerLeasesRequest) returns (ExpireWorkerLeasesResponse);
}

message CreatePipelineRequest {
  PipelineSpec pipeline = 1;
}

message CreatePipelineResponse {
  PipelineSummary pipeline = 1;
}

message UpdatePipelineVersionRequest {
  PipelineSpec pipeline = 1;
}

message UpdatePipelineVersionResponse {
  PipelineSummary pipeline = 1;
}

message GetPipelineRequest {
  string tenant_id = 1;
  string pipeline_id = 2;
  optional uint32 version = 3;
}

message GetPipelineResponse {
  PipelineSpec pipeline = 1;
}

message ListPipelinesRequest {
  optional string tenant_id = 1;
  optional DeploymentState deployment_state = 2;
}

message ListPipelinesResponse {
  repeated PipelineSummary pipelines = 1;
}

message DeployPipelineRequest {
  string tenant_id = 1;
  string pipeline_id = 2;
  uint32 version = 3;
}

message DeployPipelineResponse {
  DeploymentState deployment_state = 1;
}

message PausePipelineRequest {
  string tenant_id = 1;
  string pipeline_id = 2;
}

message PausePipelineResponse {
  DeploymentState deployment_state = 1;
}

message ResumePipelineRequest {
  string tenant_id = 1;
  string pipeline_id = 2;
}

message ResumePipelineResponse {
  DeploymentState deployment_state = 1;
}

message RequestReplayRequest {
  string tenant_id = 1;
  string pipeline_id = 2;
  uint64 from_offset = 3;
  optional uint64 to_offset = 4;
  string reason = 5;
}

message RequestReplayResponse {
  ReplayJob replay_job = 1;
}

message GetReplayJobRequest {
  string tenant_id = 1;
  string replay_job_id = 2;
}

message GetReplayJobResponse {
  ReplayJob replay_job = 1;
}

message RegisterTopicRequest {
  RegisteredTopic topic = 1;
}

message RegisterTopicResponse {
  RegisteredTopic topic = 1;
}

message CreateTenantRequest {
  TenantRecord tenant = 1;
}

message CreateTenantResponse {
  TenantSummary tenant = 1;
}

message GetTenantRequest {
  string tenant_id = 1;
}

message GetTenantResponse {
  TenantRecord tenant = 1;
}

message ListTenantsRequest {}

message ListTenantsResponse {
  repeated TenantSummary tenants = 1;
}

message AssignRoleBindingRequest {
  RoleBinding binding = 1;
}

message AssignRoleBindingResponse {
  RoleBinding binding = 1;
}

message ListRoleBindingsRequest {
  optional string tenant_id = 1;
  optional string subject_id = 2;
}

message ListRoleBindingsResponse {
  repeated RoleBinding bindings = 1;
}

message CreateServiceAccountRequest {
  string tenant_id = 1;
  string display_name = 2;
}

message CreateServiceAccountResponse {
  ServiceAccount service_account = 1;
}

message ListServiceAccountsRequest {
  optional string tenant_id = 1;
}

message ListServiceAccountsResponse {
  repeated ServiceAccount service_accounts = 1;
}

message GetTopicRequest {
  string tenant_id = 1;
  string topic_name = 2;
}

message GetTopicResponse {
  RegisteredTopic topic = 1;
}

message ListTopicsRequest {
  optional string tenant_id = 1;
}

message ListTopicsResponse {
  repeated TopicSummary topics = 1;
}

message GetRunStatusRequest {
  string tenant_id = 1;
  string pipeline_id = 2;
}

message GetRunStatusResponse {
  PipelineRunStatus run_status = 1;
}

message ListAssignmentsRequest {
  string tenant_id = 1;
  string pipeline_id = 2;
}

message ListAssignmentsResponse {
  repeated PartitionAssignment assignments = 1;
}

message RegisterWorkerRequest {
  WorkerRecord worker = 1;
}

message RegisterWorkerResponse {
  WorkerRecord worker = 1;
  uint32 lease_ttl_secs = 2;
}

message HeartbeatWorkerRequest {
  string worker_id = 1;
}

message HeartbeatWorkerResponse {
  WorkerRecord worker = 1;
  uint32 lease_ttl_secs = 2;
  repeated PartitionAssignment assignments = 3;
}

message ListWorkersRequest {
  optional WorkerStatus status = 1;
}

message ListWorkersResponse {
  repeated WorkerRecord workers = 1;
}

message RebalancePipelineRequest {
  string tenant_id = 1;
  string pipeline_id = 2;
}

message RebalancePipelineResponse {
  uint32 version = 1;
  uint64 lease_epoch = 2;
  repeated PartitionAssignment assignments = 3;
}

message ExpireWorkerLeasesRequest {
  uint32 stale_after_secs = 1;
}

message ExpireWorkerLeasesResponse {
  repeated string expired_worker_ids = 1;
  uint32 revoked_assignment_count = 2;
}

message GetCheckpointHistoryRequest {
  string tenant_id = 1;
  string pipeline_id = 2;
}

message GetCheckpointHistoryResponse {
  repeated CheckpointSummary checkpoints = 1;
}

message ListDeadLettersRequest {
  string tenant_id = 1;
  string pipeline_id = 2;
}

message ListDeadLettersResponse {
  repeated DeadLetterRecord dead_letters = 1;
}

message PipelineSpec {
  string tenant_id = 1;
  string pipeline_id = 2;
  uint32 version = 3;
  repeated SourceTopic sources = 4;
  repeated OperatorNode operators = 5;
  repeated SinkSpec sinks = 6;
  DeploymentConfig deployment = 7;
  ReplayPolicy replay_policy = 8;
  DeploymentState deployment_state = 9;
}

message SourceTopic {
  string source_id = 1;
  string topic_name = 2;
  uint32 partition_count = 3;
  string partition_key = 4;
  EventEncoding encoding = 5;
}

message OperatorNode {
  string operator_id = 1;
  repeated string upstream_ids = 2;
  OperatorKind kind = 3;
}

message OperatorKind {
  oneof kind {
    FilterOperator filter = 1;
    MapOperator map = 2;
    KeyByOperator key_by = 3;
    WindowOperator window = 4;
    AggregateOperator aggregate = 5;
    JoinOperator join = 6;
    EnrichOperator enrich = 7;
  }
}

message FilterOperator {
  string expression = 1;
}

message MapOperator {
  string projection = 1;
}

message KeyByOperator {
  string key_field = 1;
  uint32 partition_count = 2;
}

message WindowOperator {
  WindowSpec spec = 1;
}

message AggregateOperator {
  AggregateFunction function = 1;
  uint32 state_ttl_secs = 2;
}

message JoinOperator {
  JoinKind kind = 1;
  string key_field = 2;
  uint32 within_secs = 3;
}

message EnrichOperator {
  string table_name = 1;
  string key_field = 2;
}

message WindowSpec {
  WindowKind kind = 1;
  uint32 size_secs = 2;
  optional uint32 slide_secs = 3;
  uint32 grace_secs = 4;
}

message SinkSpec {
  string sink_id = 1;
  string upstream_id = 2;
  SinkKind kind = 3;
}

message SinkKind {
  oneof kind {
    KafkaSink kafka = 1;
    MaterializedViewSink materialized_view = 2;
    ObjectStorageSink object_storage = 3;
  }
}

message KafkaSink {
  string topic_name = 1;
  uint32 partition_count = 2;
  string partition_key = 3;
}

message MaterializedViewSink {
  string view_name = 1;
}

message ObjectStorageSink {
  string bucket = 1;
  string prefix = 2;
}

message DeploymentConfig {
  uint32 parallelism = 1;
  uint32 checkpoint_interval_secs = 2;
  uint32 max_in_flight_messages = 3;
}

message ReplayPolicy {
  bool allow_manual_replay = 1;
  uint32 retention_hours = 2;
}

message PipelineSummary {
  string tenant_id = 1;
  string pipeline_id = 2;
  uint32 version = 3;
  DeploymentState deployment_state = 4;
}

message RegisteredTopic {
  string tenant_id = 1;
  string topic_name = 2;
  uint32 partition_count = 3;
  uint32 retention_hours = 4;
}

message TopicSummary {
  string tenant_id = 1;
  string topic_name = 2;
  uint32 partition_count = 3;
}

message TenantRecord {
  string tenant_id = 1;
  string display_name = 2;
  string oidc_realm = 3;
  bool enabled = 4;
}

message TenantSummary {
  string tenant_id = 1;
  string display_name = 2;
  string oidc_realm = 3;
  bool enabled = 4;
}

message ServiceAccount {
  string service_account_id = 1;
  string tenant_id = 2;
  string client_id = 3;
  string display_name = 4;
  bool enabled = 5;
}

message WorkerRecord {
  string worker_id = 1;
  string endpoint = 2;
  string availability_zone = 3;
  uint32 max_assignments = 4;
  repeated string labels = 5;
  WorkerStatus status = 6;
  uint32 active_assignments = 7;
  uint64 registered_at_epoch_secs = 8;
  uint64 last_heartbeat_at_epoch_secs = 9;
}

message RoleBinding {
  SubjectKind subject_kind = 1;
  string subject_id = 2;
  optional string tenant_id = 3;
  PlatformRole role = 4;
}

message PipelineRunStatus {
  string tenant_id = 1;
  string pipeline_id = 2;
  RunStatus state = 3;
  uint64 consumer_lag = 4;
  uint32 checkpoint_age_secs = 5;
}

message PartitionAssignment {
  uint32 partition_id = 1;
  string worker_id = 2;
  uint64 lease_epoch = 3;
}

message CheckpointSummary {
  uint32 partition_id = 1;
  uint64 offset = 2;
  string snapshot_uri = 3;
}

message DeadLetterRecord {
  string record_key = 1;
  string failure_reason = 2;
  bool retryable = 3;
}

message ReplayJob {
  string replay_job_id = 1;
  string tenant_id = 2;
  string pipeline_id = 3;
  ReplayJobStatus status = 4;
}

enum DeploymentState {
  DEPLOYMENT_STATE_UNSPECIFIED = 0;
  DEPLOYMENT_STATE_DRAFT = 1;
  DEPLOYMENT_STATE_VALIDATED = 2;
  DEPLOYMENT_STATE_DEPLOYING = 3;
  DEPLOYMENT_STATE_RUNNING = 4;
  DEPLOYMENT_STATE_PAUSED = 5;
  DEPLOYMENT_STATE_FAILED = 6;
}

enum WindowKind {
  WINDOW_KIND_UNSPECIFIED = 0;
  WINDOW_KIND_TUMBLING = 1;
  WINDOW_KIND_SLIDING = 2;
}

enum AggregateFunction {
  AGGREGATE_FUNCTION_UNSPECIFIED = 0;
  AGGREGATE_FUNCTION_COUNT = 1;
  AGGREGATE_FUNCTION_SUM = 2;
  AGGREGATE_FUNCTION_MIN = 3;
  AGGREGATE_FUNCTION_MAX = 4;
  AGGREGATE_FUNCTION_AVERAGE = 5;
}

enum JoinKind {
  JOIN_KIND_UNSPECIFIED = 0;
  JOIN_KIND_INNER = 1;
  JOIN_KIND_LEFT = 2;
}

enum EventEncoding {
  EVENT_ENCODING_UNSPECIFIED = 0;
  EVENT_ENCODING_JSON = 1;
  EVENT_ENCODING_AVRO = 2;
  EVENT_ENCODING_PROTOBUF = 3;
}

enum RunStatus {
  RUN_STATUS_UNSPECIFIED = 0;
  RUN_STATUS_PENDING = 1;
  RUN_STATUS_DEPLOYING = 2;
  RUN_STATUS_RUNNING = 3;
  RUN_STATUS_REBALANCING = 4;
  RUN_STATUS_PAUSED = 5;
  RUN_STATUS_FAILED = 6;
}

enum ReplayJobStatus {
  REPLAY_JOB_STATUS_UNSPECIFIED = 0;
  REPLAY_JOB_STATUS_PENDING = 1;
  REPLAY_JOB_STATUS_RUNNING = 2;
  REPLAY_JOB_STATUS_SUCCEEDED = 3;
  REPLAY_JOB_STATUS_FAILED = 4;
}

enum SubjectKind {
  SUBJECT_KIND_UNSPECIFIED = 0;
  SUBJECT_KIND_USER = 1;
  SUBJECT_KIND_SERVICE_ACCOUNT = 2;
}

enum PlatformRole {
  PLATFORM_ROLE_UNSPECIFIED = 0;
  PLATFORM_ROLE_PLATFORM_ADMIN = 1;
  PLATFORM_ROLE_TENANT_ADMIN = 2;
  PLATFORM_ROLE_PIPELINE_EDITOR = 3;
  PLATFORM_ROLE_PIPELINE_VIEWER = 4;
  PLATFORM_ROLE_TOPIC_EDITOR = 5;
  PLATFORM_ROLE_TOPIC_VIEWER = 6;
  PLATFORM_ROLE_REPLAY_OPERATOR = 7;
}

enum WorkerStatus {
  WORKER_STATUS_UNSPECIFIED = 0;
  WORKER_STATUS_READY = 1;
  WORKER_STATUS_DRAINING = 2;
  WORKER_STATUS_EXPIRED = 3;
}
